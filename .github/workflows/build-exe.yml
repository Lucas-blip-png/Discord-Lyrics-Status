name: Build Windows EXE

# Compila o DiscordLyricsStatus.exe automaticamente.
# - Ao publicar uma Release: anexa o .exe na propria release.
# - Manualmente (workflow_dispatch): deixa o .exe como artifact para baixar.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Compilar o .exe
        run: pyinstaller --onefile --console --name DiscordLyricsStatus --collect-all winrt --collect-all syncedlyrics --noconfirm lyrics.py

      - name: Subir como artifact (download manual)
        uses: actions/upload-artifact@v4
        with:
          name: DiscordLyricsStatus
          path: dist/DiscordLyricsStatus.exe

      - name: Anexar a Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/DiscordLyricsStatus.exe
