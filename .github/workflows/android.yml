name: Build Android APK

# Compila um APK de debug (instalavel via sideload).
# - push em android/** ou run manual: deixa o APK como artifact para baixar.
# - ao publicar uma Release: anexa o APK na release.
on:
  push:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Compilar APK de debug
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Subir APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiscordLyrics-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Anexar a Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
